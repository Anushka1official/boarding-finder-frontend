<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Boarding Finder — Saved Listings</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/><link href="styles.css" rel="stylesheet"/>
</head>
<body class="bg-body-tertiary bootstrap-app" data-page="saved">
<nav class="navbar navbar-expand-lg bg-white bg-opacity-75 shadow-sm">
<div class="nav-brand" onclick="showPage('home'); closeMobileMenu();">
<div class="logo">
<svg viewbox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
</div>
<span>Smart<em>Boarding</em></span>
</div>
<div class="nav-links">
<a class="active" id="nav-home" onclick="showPage('home'); closeMobileMenu();">Home</a>
<a id="nav-results" onclick="showPage('results'); closeMobileMenu();">Search</a>
<a id="nav-dashboard" onclick="showPage('dashboard'); closeMobileMenu();">Owner Portal</a>
</div>
<div class="nav-end">
<button class="btn btn-ghost fw-semibold btn-outline-secondary" onclick="showPage('dashboard')">List Property</button>
<button class="btn btn-ghost fw-semibold btn-outline-secondary" onclick="showPage('login')">Sign In</button>
<button class="btn btn-primary fw-semibold" onclick="showPage('signup')">Sign Up</button>
</div>
<button aria-label="Open menu" class="mobile-nav-toggle" onclick="toggleMobileMenu()">☰</button>
</nav>
<div class="mobile-nav-menu" id="mobile-nav-menu">
<div class="mobile-nav-user" id="mobile-nav-user">Menu</div>
<div class="mobile-nav-links">
<a id="mobile-nav-home" onclick="showPage('home'); closeMobileMenu();">Home</a>
<a id="mobile-nav-results" onclick="showPage('results'); closeMobileMenu();">Search</a>
<a id="mobile-nav-dashboard" onclick="showPage('dashboard'); closeMobileMenu();">Dashboard</a>
</div>
<div class="mobile-nav-actions" id="mobile-nav-actions" style="margin-top:10px;"></div>
</div>
<div class="page active" id="page-saved">
<div style="max-width:1100px;margin:0 auto;padding:32px 24px;">
<div class="breadcrumb small">
<a onclick="showPage('home')">Home</a><span class="sep">›</span>
<span>Saved Boardings</span>
</div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
<div>
<h1 style="font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--gray-900);">♥ Saved Boardings</h1>
<p id="saved-subtitle" style="color:var(--gray-500);font-size:14px;margin-top:4px;">Your favourite boarding places</p>
</div>
<button class="btn btn-outline btn-sm fw-semibold btn-outline-primary" onclick="showPage('results')">🔍 Find More</button>
</div>
<div class="cards-grid row g-4" id="saved-grid">
<!-- populated by loadSavedPage() -->
</div>
</div>
<footer style="margin-top:40px;background:#002D38;color:var(--gray-400);text-align:center;padding:24px;font-size:13px;">
<strong style="color:white">Smart Boarding Finder</strong> · © 2026
  </footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="app.js"></script>
</body>
</html>
